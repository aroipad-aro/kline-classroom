<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>K 線型態互動教室 · 捏 K 棒</title>
<style>
  :root{
    --bg:#0f1320; --panel:#181e30; --panel2:#202842; --line:#2c3552;
    --ink:#eef1f8; --dim:#8b93aa;
    --up:#e84d5b;     /* 台股紅漲(陽線) */
    --down:#27c08a;   /* 台股綠跌(陰線) */
    --doji:#e8b34b;
    --bull:#e84d5b; --bear:#27c08a; --warn:#e8b34b; --neutral:#7f8aa8;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  /* 整頁可上下捲動,但隱藏捲軸 */
  html{height:100%}
  html,body{scrollbar-width:none;-ms-overflow-style:none}
  html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
  body{
    background:var(--bg);color:var(--ink);min-height:100%;
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    display:flex;flex-direction:column;max-width:560px;margin:0 auto;padding-bottom:24px;
    user-select:none;-webkit-user-select:none;overscroll-behavior-y:none;
  }
  header{padding:12px 16px 4px}
  .brand{font-size:11px;letter-spacing:3px;color:var(--doji)}
  h1{font-size:17px;font-weight:800;margin-top:2px}
  h1 small{font-size:11px;color:var(--dim);font-weight:400;margin-left:8px;display:block;margin-top:3px}

  /* 位置情境切換 */
  .ctx-seg{display:flex;gap:6px;padding:8px 16px 4px}
  .ctx-seg button{
    flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    color:var(--dim);font-size:13px;font-weight:700;padding:9px 0;font-family:inherit;
  }
  .ctx-seg button.on{color:#11131f;border-color:transparent}
  .ctx-seg button.on[data-ctx="low"]{background:var(--down)}
  .ctx-seg button.on[data-ctx="mid"]{background:#9aa6c4}
  .ctx-seg button.on[data-ctx="high"]{background:var(--up)}

  /* 畫布 */
  .stage{position:relative;height:300px;flex:0 0 auto}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  .swap{
    position:absolute;top:10px;right:12px;
    background:var(--panel2);border:1px solid var(--line);border-radius:99px;
    color:var(--ink);font-size:12px;font-weight:700;padding:8px 14px;font-family:inherit;
  }
  .hint{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    font-size:11px;color:var(--dim);background:rgba(15,19,32,.75);
    padding:3px 14px;border-radius:99px;pointer-events:none;transition:opacity .5s;white-space:nowrap;
  }

  .msg-row{padding:6px 16px 0;min-height:18px}
  .apply-msg{font-size:11px;color:var(--dim);line-height:1.4}
  .apply-msg.err{color:var(--up)}
  .apply-msg.ok{color:var(--down)}

  /* K 棒清單 */
  .list-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;font-size:11px;color:var(--dim);letter-spacing:1px}
  .mini-btn{
    background:var(--panel2);border:1px solid var(--line);border-radius:99px;
    color:var(--doji);font-size:12px;font-weight:800;padding:6px 14px;font-family:inherit;letter-spacing:0;
  }
  .mini-btn:active{opacity:.8}
  .clist{padding:0 16px}
  .crow{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;transition:border-color .12s,box-shadow .15s ease}
  .crow.sel{border-color:var(--doji)}
  .crow.reordering{position:relative;z-index:30;border-color:var(--doji);box-shadow:0 14px 30px rgba(0,0,0,.55)}
  .crow-main{display:flex;align-items:center;gap:10px}
  .crow .drag{cursor:grab;color:var(--dim);font-size:19px;background:none;border:none;padding:0 4px;font-family:inherit;touch-action:none}
  .cinfo{flex:1;min-width:0;cursor:pointer}
  .ctitle{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px}
  .ctitle .tag{font-size:10px;font-weight:800;padding:2px 9px;border-radius:99px;color:#11131f}
  .csub{font-size:12px;color:var(--dim);margin-top:3px;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cdel{background:none;border:none;color:var(--up);font-size:21px;line-height:1;padding:0 4px;font-family:inherit;cursor:pointer}

  .cedit{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
  .cedit .quotes{display:flex;gap:6px}
  .cedit .q{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:6px 0;text-align:center;transition:border-color .15s}
  .cedit .q .l{font-size:10px;color:var(--dim)}
  .cedit .q input{
    background:transparent;border:none;outline:none;color:var(--ink);
    font-size:15px;font-weight:800;text-align:center;width:100%;font-family:inherit;
    font-variant-numeric:tabular-nums;user-select:text;-webkit-user-select:text;
  }
  .cedit .q:focus-within{border-color:var(--doji)}
  .cedit .apply{
    margin-top:9px;width:100%;background:var(--doji);border:none;border-radius:10px;
    color:#11131f;font-size:13px;font-weight:800;padding:10px 0;font-family:inherit;
  }
  .cedit .apply:active{opacity:.85}

  /* 解讀卡 */
  .card{margin:12px 16px 8px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px;min-height:148px}
  .card-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .pname{font-size:19px;font-weight:800}
  .badge{font-size:11px;font-weight:800;padding:3px 12px;border-radius:99px;color:#11131f}
  .feat{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.6}
  .explain{font-size:14px;line-height:1.8;margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
  .explain b{color:var(--doji)}

  /* 經典型態快選 / 我的收藏 */
  .chips-label{font-size:11px;color:var(--dim);padding:0 16px;letter-spacing:1px}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:6px 16px 14px;-webkit-overflow-scrolling:touch}
  .chips::-webkit-scrollbar{display:none}
  .chips button{
    flex:0 0 auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    color:var(--ink);font-size:12px;font-weight:700;padding:9px 14px;font-family:inherit;
  }
  .saves-head{display:flex;align-items:center;justify-content:space-between;padding-top:4px}
  .save-chip{
    flex:0 0 auto;display:flex;align-items:center;gap:8px;
    background:var(--panel2);border:1px solid var(--doji);border-radius:12px;
    color:var(--ink);font-size:12px;font-weight:700;padding:9px 14px;font-family:inherit;
  }
  .save-chip .name{cursor:pointer}
  .save-chip .del{
    color:var(--dim);font-weight:800;font-size:15px;line-height:1;
    border:none;background:transparent;padding:0;font-family:inherit;cursor:pointer;
  }
  .saves .empty{flex:0 0 auto;color:var(--dim);font-size:12px;padding:9px 2px}
</style>
</head>
<body>

<header>
  <div class="brand">龍哥 K 線教室</div>
  <h1>捏 K 棒 · 多根序列<small>新增多根 K 棒、拖曳排序、就地改四價,自動判讀最新 1～3 根型態</small></h1>
</header>

<div class="ctx-seg" id="ctxSeg">
  <button data-ctx="low">📉 低檔(大跌後)</button>
  <button data-ctx="mid" class="on">盤整中</button>
  <button data-ctx="high">📈 高檔(大漲後)</button>
</div>

<div class="stage">
  <canvas id="cv"></canvas>
  <button class="swap" id="swapBtn">⇄ 陽陰互換</button>
  <div class="hint" id="hint">拖動把手改形狀,或在下方清單改四價</div>
</div>

<div class="card">
  <div class="card-top">
    <span class="pname" id="pName">--</span>
    <span class="badge" id="pBadge">--</span>
  </div>
  <div class="feat" id="pFeat">--</div>
  <div class="explain" id="pExp">--</div>
</div>

<div class="msg-row"><span class="apply-msg" id="applyMsg">在清單點某根輸入真實股價,多根共用同一條價格軸自動判讀型態</span></div>

<div class="list-head">
  K 棒清單(由左到右 = 時間順序)<button id="addBtn" class="mini-btn">＋ 新增 K 棒</button>
</div>
<div class="clist" id="clist"></div>

<div class="chips-label">經典型態快選(一鍵載入整組)</div>
<div class="chips" id="chips"></div>

<div class="chips-label saves-head">
  我的收藏<button id="saveBtn" class="mini-btn">＋ 儲存目前畫面</button>
</div>
<div class="chips saves" id="saves"></div>

<script>
/* ════════════════════════════════════════════════
   狀態:單一可變長度的 K 棒清單,共用一條動態價格軸
   (每根內部以 0~100 刻度繪圖/判別;rp 為使用者輸入的真實股價)
════════════════════════════════════════════════ */
const DEF_AXIS={min:100,max:150};
let candles=[{o:38,c:62,h:78,l:22}];
let axis={...DEF_AXIS};
let sel=0, expanded=-1, ctxNow="mid";

const priceOf=(v,a=axis)=>a.min+(a.max-a.min)*v/100;       // 內部→真實股價
const un=(price,a=axis)=>(price-a.min)/(a.max-a.min)*100;   // 真實股價→內部
const fmtPrice=p=>{const s=(+p).toFixed(2);return s.replace(/\.?0+$/,"");};
const px=(v,a=axis)=>fmtPrice(priceOf(v,a));

/* 共用小工具 */
const bod=k=>Math.abs(k.c-k.o);
const yang=k=>k.c>k.o, yin=k=>k.c<k.o;
const bTop=k=>Math.max(k.o,k.c), bBot=k=>Math.min(k.o,k.c);

/* ════════════════════════════════════════════════
   型態知識庫:每型態含特徵 + 低檔/盤整/高檔 三種解讀
════════════════════════════════════════════════ */
const TAG={bull:["看漲訊號","var(--bull)"],bear:["看跌訊號","var(--bear)"],
  rev:["反轉訊號","var(--warn)"],warn:["警示訊號","var(--warn)"],neu:["中性觀望","var(--neutral)"]};

/* ── 單根 ── */
const LIB1={
  flat:{feat:"開＝高＝低＝收,全日一價到底。",
    low:["rev","通常是<b>跌停鎖死</b>(恐慌未止、後市續弱)或<b>漲停鎖死</b>(強力反轉第一棒)。低檔若出現漲停一字,常是主力進場的強烈訊號。"],
    mid:["neu","單邊力量壓倒性,鎖漲停=極強、鎖跌停=極弱,順勢解讀即可。"],
    high:["warn","高檔漲停一字代表噴出趕頂,動能極強但也接近過熱;若是跌停一字則是<b>崩跌警訊</b>,反應要快。"]},
  doji:{feat:"開盤價≈收盤價,留上下影線。多空勢均力敵,原本佔優的一方開始失去主導。",
    low:["bull","<b>低檔十字=空方力竭</b>。下跌途中買盤開始承接,變盤轉漲機率升高,是開始找買點的訊號。可搭配 KD 低檔黃金交叉確認。"],
    mid:["neu","盤整中的十字線參考性低,只代表市場觀望,等突破方向再行動。"],
    high:["bear","<b>高檔十字=多方力竭</b>。上漲遭遇賣壓、空方追上多方,差不多是考慮脫手的訊號,隔日若收黑即確認轉折。"]},
  longleg:{feat:"開收幾乎同價,上下影線都很長。同一根 K 線內多空激烈拉扯,雙方都曾佔優又被打回。",
    low:["rev","大跌後的長腳十字常是<b>劇烈洗盤的尾聲</b>,殺低有人接、拉高有人試,變盤反彈機率高。"],
    mid:["neu","市場分歧明顯加大,波動放大但方向未定,等表態。"],
    high:["warn","高位劇烈震盪,籌碼鬆動,<b>反轉風險高</b>,不宜追價。"]},
  tline:{feat:"開盤≈最高≈收盤,只留長下影線(T 字/蜻蜓十字)。盤中重挫但買盤把價格全數拉回。",
    low:["bull","<b>強力止跌訊號</b>:空方一度大幅壓低,買盤全數承接拉回,下方支撐明確,空頭市場可能結束。"],
    mid:["neu","下方出現承接買盤,屬偏多訊號,待放量確認。"],
    high:["warn","雖然收回來了,但盤中曾出現巨大賣壓,<b>留意主力盤中出貨</b>,邏輯同吊人線,岌岌可危。"]},
  gravestone:{feat:"開盤≈最低≈收盤,只留長上影線(倒T/墓碑十字)。多方一度推升,但賣壓把漲幅全數吞回。",
    low:["rev","多方嘗試反攻雖未成功,但已開始試探,屬<b>初步止跌訊號</b>,需隔日收紅確認。"],
    mid:["bear","上方賣壓沉重,壓力區明確,突破不易。"],
    high:["bear","<b>墓碑線,強烈見頂警訊</b>:攻高全被打回,留下滿手套牢,後市看跌力道強,宜先退出觀望。"]},
  hammer:{feat:"小實體在上、下影線≥實體 2 倍、幾乎無上影線。盤中重挫後被強力買回。",
    low:["bull","<b>鎚子線</b>:價格被重重打下後,低檔有大買盤敲進,是「止跌回升」的代表型態。注意:強烈空頭中勿急著接刀,站回關鍵均線再確認。"],
    mid:["neu","下影線代表下方有承接力道,偏多看待但需確認。"],
    high:["bear","<b>吊人線</b>:外觀與鎚子完全相同,但出現在大漲後意義相反——盤中曾大幅下殺,高檔賣壓已現,多頭險勝卻是強弩之末,頭部反轉警告。"]},
  invhammer:{feat:"小實體在下、上影線≥實體 2 倍、幾乎無下影線。盤中衝高但被賣壓打回。",
    low:["rev","<b>倒鎚線</b>:雖收在低檔,但長上影線代表多方曾試圖反攻,是止跌的可能訊號之一,待隔日確認。"],
    mid:["neu","上方賣壓明顯,短線突破有阻力。"],
    high:["bear","<b>流星線(射擊之星)</b>:如流星劃過天際,衝高遭強大賣壓摜回,標準的「假突破」套牢線,頭部反轉的強烈訊號。"]},
  marubozuUp:{feat:"光頭光腳陽線:幾乎沒有影線的長紅實體。從開盤買到收盤,多方力量壓倒性。",
    low:["bull","<b>低檔長紅常是反轉第一棒</b>(曙光初現),若帶大量更可信,代表買盤強勢進場掃貨。"],
    mid:["bull","帶量長紅突破盤整區,往往是<b>攻擊發起訊號</b>,強烈漲勢。"],
    high:["warn","高檔長紅雖強,但要提防<b>末升段噴出</b>:若隔日不續強反收黑,可能是邀請散戶抬轎的出貨棒。"]},
  marubozuDn:{feat:"光頭光腳陰線:幾乎沒有影線的長黑實體。從開盤殺到收盤,賣方力量壓倒性。",
    low:["rev","恐慌性殺盤。但大跌末端的<b>爆量長黑也可能是最後趕底</b>,殺完籌碼乾淨反而醞釀反彈,留意隔日是否止跌。"],
    mid:["bear","長黑跌破支撐即轉弱,是強勢下跌格局,防範跌勢中再出現長黑棒的暴跌。"],
    high:["bear","<b>高檔長黑=反轉急訊</b>。漲多後一根吞掉多日漲幅,主力出貨意味濃,宜速減碼。"]},
  upShadowUp:{feat:"只有上影線的陽線:收紅但留上影。上升有阻力,上影線越長,壓力越大。",
    low:["rev","低檔出現代表<b>開始有人試多</b>,雖攻高遇壓,但買方已進場,屬打底過程。"],
    mid:["bear","看跌信號:上方賣壓明確,上影線越長,後市越看跌。"],
    high:["bear","攻高被打回的<b>假突破套牢線</b>,高檔出現要特別小心,常是出貨手法。"]},
  dnShadowUp:{feat:"只有下影線的陽線:收紅且下影明顯。盤中下殺被買盤接走,先跌後漲,買方力量較大。",
    low:["bull","<b>看漲信號</b>:跌勢中買盤強力承接並推升收紅,止跌反轉的代表訊號。"],
    mid:["bull","下方支撐扎實,買方略勝,偏多格局。"],
    high:["warn","雖收紅,但盤中曾重挫,代表高檔已有大單調節,<b>留意吊人線邏輯</b>,勿過度樂觀。"]},
  upShadowDn:{feat:"只有上影線的陰線:收黑且留上影。上漲出現壓力,上影線越長,後市越容易看跌。",
    low:["rev","低檔反彈遇壓收黑,短線仍弱;但若連續出現且低點不再破,是打底跡象。"],
    mid:["bear","攻高失敗又收黑,空方明顯佔優。"],
    high:["bear","<b>見頂信號</b>:衝高回落且收黑,比流星更弱勢,頭部成形機率高。"]},
  dnShadowDn:{feat:"只有下影線的陰線:收黑但下影明顯。下跌出現抗力,下影線越長,後市越容易反轉。",
    low:["bull","<b>見底信號</b>:殺低有人接,雖收黑但空方力道已被消化,下影越長反轉機率越高。"],
    mid:["neu","下有支撐、上有賣壓,多空僵持。"],
    high:["warn","高檔盤中重挫雖有承接,但已暴露賣壓,警惕轉折。"]},
  bothUp:{feat:"上下影線陽線:紅實體+上下影線。開盤後曾下探、買方勝出推升,收前又遇獲利了結。",
    low:["bull","<b>反轉信號</b>:大跌後出現,表示股價可能已觸底,多方開始反擊,留意反彈機會。"],
    mid:["neu","多方略佔上風,但雙方仍在拉鋸,實體越短越勢均力敵。"],
    high:["warn","<b>反轉信號</b>:大漲後出現代表高位震盪,籌碼開始換手,即將反轉的風險升高。"]},
  bothDn:{feat:"上下影線陰線:黑實體+上下影線。開盤買方曾強勢,但最終賣方勝出。",
    low:["rev","<b>反轉信號</b>:大跌後出現,空方雖勝但力道收斂,有反彈的可能。"],
    mid:["bear","賣方在交戰後勝出,偏空看待,實體越長空方越強。"],
    high:["bear","<b>反轉信號</b>:大漲後出現,後市可能下跌,獲利者開始撤退。"]},
  spinning:{feat:"紡錘線:小實體+上下影線。多空在小範圍內反覆拉鋸,誰都沒佔到便宜。",
    low:["rev","跌勢動能減弱,變盤前兆,搭配量縮更像底部整理。"],
    mid:["neu","常見於盤整,代表觀望氣氛濃,等待方向。"],
    high:["warn","漲勢動能轉弱的徵兆,高檔連續紡錘要提高警覺。"]},
};

/* ════════════════════════════════════════════════
   型態判別
════════════════════════════════════════════════ */
function classify1(k){
  const o=k.o,c=k.c,h=k.h,l=k.l,R=h-l;
  if(R<2.5)return["flat","一字線"];
  const body=Math.abs(c-o)/R, up=(h-Math.max(o,c))/R, dn=(Math.min(o,c)-l)/R;
  const yg=c>o, yn=c<o;
  const T=0.07;            // 「幾乎沒有」門檻
  if(body<0.06){           // 十字家族
    if(up<0.12&&dn>0.45)return["tline","T 字線(蜻蜓十字)"];
    if(dn<0.12&&up>0.45)return["gravestone","倒 T 字線(墓碑十字)"];
    if(up>0.28&&dn>0.28)return["longleg","長腳十字線"];
    return["doji","十字線"];
  }
  if(body<0.38){           // 小實體家族
    if(dn>=body*1.8&&up<T)return["hammer",ctxNow==="high"?"吊人線":"鎚子線"];
    if(up>=body*1.8&&dn<T)return["invhammer",ctxNow==="high"?"流星線(射擊之星)":"倒鎚線"];
    if(up>0.14&&dn>0.14)return["spinning","紡錘線"+(yg?"(陽)":yn?"(陰)":"")];
  }
  if(up<T&&dn<T)return yg?["marubozuUp",body>0.7?"光頭光腳長紅":"光頭光腳陽線"]
                         :["marubozuDn",body>0.7?"光頭光腳長黑":"光頭光腳陰線"];
  if(dn<T)return yg?["upShadowUp","只有上影線的陽線"]:["upShadowDn","只有上影線的陰線"];
  if(up<T)return yg?["dnShadowUp","只有下影線的陽線"]:["dnShadowDn","只有下影線的陰線"];
  return yg?["bothUp","上下影線陽線"]:["bothDn","上下影線陰線"];
}

function classify2(a,b){
  const mid1=(a.o+a.c)/2;
  if(yin(a)&&yang(b)&&bTop(b)>=bTop(a)+1&&bBot(b)<=bBot(a)-1)return["engulfBull","看漲吞噬"];
  if(yang(a)&&yin(b)&&bTop(b)>=bTop(a)+1&&bBot(b)<=bBot(a)-1)return["engulfBear","看跌吞噬"];
  if(bod(a)>=16&&bTop(b)<bTop(a)-1&&bBot(b)>bBot(a)+1){
    if(bod(b)<2.5)return["haramiCross","十字懷抱(孕線)"];
    if(bod(b)<bod(a)*0.6)return yin(a)?["haramiBull","看漲母子(懷抱線)"]:["haramiBear","看跌母子(懷抱線)"];
  }
  if(yang(a)&&bod(a)>=16&&yin(b)&&b.o>a.c&&b.c<mid1&&b.c>a.o)return["darkCloud","烏雲罩頂"];
  if(yin(a)&&bod(a)>=16&&yang(b)&&b.o<a.c&&b.c>mid1&&b.c<a.o)return["piercing","貫穿線(曙光乍現)"];
  if(Math.abs(a.h-b.h)<1.6)return["tweezerTop","平頭頂部(鑷頂)"];
  if(Math.abs(a.l-b.l)<1.6)return["tweezerBot","平頭底部(鑷底)"];
  if(yang(a)&&yang(b)&&bod(a)>=12&&bod(b)>=12&&b.c>a.c&&b.o>=bBot(a))return["twinYang","順勢雙陽(連兩紅)"];
  if(yin(a)&&yin(b)&&bod(a)>=12&&bod(b)>=12&&b.c<a.c&&b.o<=bTop(a))return["twinYin","順勢雙陰(連兩黑)"];
  return["free2","自由組合"];
}

function classify3(a,b,c){
  const mid1=(a.o+a.c)/2;
  if(yin(a)&&bod(a)>=16&&bod(b)<=8&&bTop(b)<a.c+2&&yang(c)&&bod(c)>=12&&c.c>mid1)
    return["morningStar","晨星(早晨之星)"];
  if(yang(a)&&bod(a)>=16&&bod(b)<=8&&bBot(b)>a.c-2&&yin(c)&&bod(c)>=12&&c.c<mid1)
    return["eveningStar","夜星(黃昏之星)"];
  const inA=bTop(b)<bTop(a)-1&&bBot(b)>bBot(a)+1;
  if(yin(a)&&bod(a)>=16&&inA&&yang(c)&&c.c>bTop(a))return["threeInsideUp","內困三日翻紅"];
  if(yang(a)&&bod(a)>=16&&inA&&yin(c)&&c.c<bBot(a))return["threeInsideDown","內困三日翻黑"];
  const engB=bTop(b)>=bTop(a)+1&&bBot(b)<=bBot(a)-1;
  if(yin(a)&&yang(b)&&engB&&yang(c)&&c.c>b.c)return["threeOutsideUp","外側三日翻紅"];
  if(yang(a)&&yin(b)&&engB&&yin(c)&&c.c<b.c)return["threeOutsideDown","外側三日翻黑"];
  if(yang(a)&&yang(b)&&yang(c)&&bod(a)>=10&&bod(b)>=10&&bod(c)>=10
     &&b.c>a.c&&c.c>b.c&&b.o>=bBot(a)&&c.o>=bBot(b))return["threeSoldiers","紅三兵"];
  if(yin(a)&&yin(b)&&yin(c)&&bod(a)>=10&&bod(b)>=10&&bod(c)>=10
     &&b.c<a.c&&c.c<b.c&&b.o<=bTop(a)&&c.o<=bTop(b))return["threeCrows","三隻烏鴉(黑三兵)"];
  return["free3","自由組合"];
}

/* 依「已輸入真實價(rp)的根」算出共用價格軸,再把這些根換算回內部 0~100。
   尚未輸入真實價的根維持原本內部形狀,顯示價自動落在同一條軸上。 */
function refit(){
  const entered=candles.filter(k=>k.rp);
  if(entered.length){
    let lo=Math.min(...entered.map(k=>k.rp.l)),hi=Math.max(...entered.map(k=>k.rp.h));
    let span=hi-lo;if(span<1e-6)span=Math.max(hi*0.04,1);
    const pad=0.235*span;axis={min:lo-pad,max:hi+pad};
  }
  candles.forEach(k=>{if(k.rp){k.o=un(k.rp.o);k.c=un(k.rp.c);k.h=un(k.rp.h);k.l=un(k.rp.l);}});
}

/* ── 型態判讀:取清單最新 1～3 根 ── */
function judge(){
  const n=candles.length;
  if(!n){
    $("pName").textContent="—";$("pBadge").textContent="";$("pBadge").style.background="transparent";
    $("pFeat").textContent="清單目前沒有 K 棒。";
    $("pExp").innerHTML="按上方「＋ 新增 K 棒」開始捏出你的 K 線序列。";
    return;
  }
  let key,name,lib;
  if(n===1){[key,name]=classify1(candles[0]);lib=LIB1;}
  else if(n===2){[key,name]=classify2(candles[n-2],candles[n-1]);lib=LIB2;}
  else{[key,name]=classify3(candles[n-3],candles[n-2],candles[n-1]);lib=LIB3;}
  const p=lib[key],[tag,text]=p[ctxNow];
  $("pName").textContent=name;
  const[tl,tc]=TAG[tag];$("pBadge").textContent=tl;$("pBadge").style.background=tc;
  const judged=n>3?`(判讀最新三根:第 ${n-2}～${n} 根) `:n>1?`(判讀最新 ${Math.min(n,3)} 根) `:"";
  $("pFeat").textContent=judged+"型態特徵:"+p.feat;
  const ctxName={low:"📉 低檔(大跌後)",mid:"盤整中",high:"📈 高檔(大漲後)"}[ctxNow];
  $("pExp").innerHTML=`<b>${ctxName}出現:</b>`+text;
}

/* ════════════════════════════════════════════════
   Canvas 繪圖(可變根數,動態幾何)
════════════════════════════════════════════════ */
const cv=$("cv"),ctx=cv.getContext("2d");
let W,H,dpr;
function resize(){
  dpr=window.devicePixelRatio||1;
  const r=cv.parentElement.getBoundingClientRect();
  cv.width=r.width*dpr;cv.height=r.height*dpr;
  W=r.width;H=r.height;ctx.setTransform(dpr,0,0,dpr,0,0);draw();
}
window.addEventListener("resize",resize);
const PT=26,PB=30;
const yAt=v=>PT+(H-PT-PB)*(1-v/100);
const vAt=y=>Math.max(2,Math.min(98,(1-(y-PT)/(H-PT-PB))*100));

function geo(){
  const n=candles.length||1;
  const margin=24;
  const usable=Math.max(40,W-margin*2);
  const slot=usable/n;
  const bw=Math.max(5,Math.min(46,slot*0.34));
  const hr=Math.max(7,Math.min(15,slot*0.18));
  const off=Math.max(bw/2+10,Math.min(58,slot*0.32));
  return{n,margin,slot,bw,hr,off};
}
function centers(){const{margin,slot}=geo();return candles.map((_,i)=>margin+slot*(i+0.5));}
function candleColor(k){return k.c>k.o?getCss("--up"):k.c<k.o?getCss("--down"):getCss("--doji");}
function getCss(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

function drawTrend(){
  if(!candles.length||candles.length>3)return;
  const c0=centers()[0];
  const count=3,bw=10,gap=6;
  let ys,col;
  if(ctxNow==="mid"){ys=[51,47,52];col="#5a6480";}
  else if(ctxNow==="low"){ys=[80,66,52];col=getCss("--down");}
  else{ys=[20,34,48];col=getCss("--up");}
  let x0=c0-geo().bw/2-count*(bw+gap)-14;
  if(x0<2)return;
  ctx.globalAlpha=0.28;
  ys.forEach((y,i)=>{const x=x0+i*(bw+gap),yy=yAt(y);
    ctx.strokeStyle=col;ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(x+bw/2,yy-12);ctx.lineTo(x+bw/2,yy+12);ctx.stroke();
    ctx.fillRect(x,yy-7,bw,14);});
  ctx.globalAlpha=1;
  ctx.fillStyle="#6b7488";ctx.font="10px sans-serif";ctx.textAlign="left";
  const label=ctxNow==="low"?"← 前面一段下跌":ctxNow==="high"?"← 前面一段上漲":"← 前面橫盤";
  ctx.fillText(label,x0,yAt(ys[0])+(ctxNow==="high"?28:-22));
}

function draw(){
  if(!W)return;
  ctx.clearRect(0,0,W,H);
  drawTrend();
  if(!candles.length){
    ctx.fillStyle="#6b7488";ctx.font="13px sans-serif";ctx.textAlign="center";
    ctx.fillText("清單沒有 K 棒,按「＋ 新增 K 棒」開始",W/2,H/2);
    return;
  }
  const g=geo(),cxs=centers();
  candles.forEach((k,i)=>{
    const cx=cxs[i],col=candleColor(k),isSel=i===sel;
    const yo=yAt(k.o),yc=yAt(k.c),yh=yAt(k.h),yl=yAt(k.l);
    ctx.strokeStyle=col;ctx.lineWidth=g.bw<14?2:3;
    ctx.beginPath();ctx.moveTo(cx,yh);ctx.lineTo(cx,yl);ctx.stroke();ctx.lineWidth=1;
    const top=Math.min(yo,yc),hgt=Math.max(2,Math.abs(yo-yc));
    ctx.fillStyle=col;ctx.fillRect(cx-g.bw/2,top,g.bw,hgt);
    if(isSel){
      ctx.strokeStyle="rgba(255,255,255,0.25)";ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(cx-g.off,yo);ctx.lineTo(cx-g.bw/2,yo);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+g.bw/2,yc);ctx.lineTo(cx+g.off,yc);ctx.stroke();
      ctx.setLineDash([]);
      handle(cx,yh,"高",getCss("--up"),g.hr);
      handle(cx,yl,"低",getCss("--down"),g.hr);
      handle(cx-g.off,yo,"開","#9aa6c4",g.hr);
      handle(cx+g.off,yc,"收",col,g.hr);
    }
    ctx.fillStyle=isSel?getCss("--doji"):"#6b7488";
    ctx.font=(isSel?"bold ":"")+"10px sans-serif";ctx.textAlign="center";
    ctx.fillText(`${i+1}`+(i===candles.length-1?"·新":""),cx,H-8);
  });
}
function handle(x,y,t,c,r){
  ctx.beginPath();ctx.arc(x,y,r,0,7);
  ctx.fillStyle="#11141f";ctx.fill();
  ctx.strokeStyle=c;ctx.lineWidth=2;ctx.stroke();ctx.lineWidth=1;
  ctx.fillStyle=c;ctx.font="bold "+(r<14?"11":"12")+"px sans-serif";ctx.textAlign="center";
  ctx.fillText(t,x,y+4);
}

/* ════════════════════════════════════════════════
   Canvas 拖拉:選取那根的四個把手
════════════════════════════════════════════════ */
let drag=null,hintOn=true;
function pos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;
  return{x:t.clientX-r.left,y:t.clientY-r.top};}
function pick(p){
  if(!candles.length)return null;
  const g=geo(),cx=centers()[sel],k=candles[sel];
  let best=null,bd=1e9;
  [["h",cx,yAt(k.h)],["l",cx,yAt(k.l)],["o",cx-g.off,yAt(k.o)],["c",cx+g.off,yAt(k.c)]]
   .forEach(([key,x,y])=>{const d=Math.hypot(p.x-x,p.y-y);if(d<bd){bd=d;best={i:sel,key};}});
  return bd<g.hr+22?best:null;
}
function selectByX(x){
  const cxs=centers();let bi=0,bd=1e9;
  cxs.forEach((cx,i)=>{const d=Math.abs(x-cx);if(d<bd){bd=d;bi=i;}});
  if(bd<geo().slot/2&&sel!==bi){sel=bi;renderList();draw();judge();}
}
function dragTo(y){
  const v=vAt(y),K=candles[drag.i],k=drag.key;
  if(k==="o"){K.o=v;K.h=Math.max(K.h,v);K.l=Math.min(K.l,v);}
  else if(k==="c"){K.c=v;K.h=Math.max(K.h,v);K.l=Math.min(K.l,v);}
  else if(k==="h"){K.h=Math.max(v,K.o,K.c);}
  else if(k==="l"){K.l=Math.min(v,K.o,K.c);}
  if(K.rp){K.rp={o:priceOf(K.o),h:priceOf(K.h),l:priceOf(K.l),c:priceOf(K.c)};}
  draw();judge();
  if(hintOn){$("hint").style.opacity=0;hintOn=false;}
}
function down(e){const p=pos(e),h=pick(p);if(h){drag=h;dragTo(p.y);}else selectByX(p.x);}
function endDrag(){if(drag){drag=null;renderList();}}
cv.addEventListener("touchstart",e=>{e.preventDefault();down(e);},{passive:false});
cv.addEventListener("touchmove",e=>{e.preventDefault();if(drag)dragTo(pos(e).y);},{passive:false});
cv.addEventListener("touchend",endDrag);
cv.addEventListener("mousedown",down);
cv.addEventListener("mousemove",e=>{if(drag)dragTo(pos(e).y);});
window.addEventListener("mouseup",endDrag);

$("swapBtn").addEventListener("click",()=>{
  if(!candles.length)return;
  const K=candles[sel];[K.o,K.c]=[K.c,K.o];
  if(K.rp){[K.rp.o,K.rp.c]=[K.rp.c,K.rp.o];}
  draw();judge();renderList();
});

function setCtx(v){ctxNow=v;document.querySelectorAll("#ctxSeg button").forEach(x=>x.classList.toggle("on",x.dataset.ctx===v));}
document.querySelectorAll("#ctxSeg button").forEach(b=>{

/* ════════════════════════════════════════════════
   K 棒清單:就地編輯 / 刪除 / 新增 / 拖曳排序
════════════════════════════════════════════════ */
function rowDir(k){return k.c>k.o?["紅","var(--up)"]:k.c<k.o?["綠","var(--down)"]:["平","var(--doji)"];}
function renderList(){
  const box=$("clist");box.innerHTML="";
  candles.forEach((k,i)=>{
    const row=document.createElement("div");
    row.className="crow"+(i===sel?" sel":"")+(reorder&&reorder.cand===k?" reordering":"");
    const main=document.createElement("div");main.className="crow-main";

    const dr=document.createElement("button");dr.className="drag";dr.textContent="≡";dr.title="拖曳排序";
    dr.addEventListener("touchstart",e=>startReorder(e,k),{passive:false});
    dr.addEventListener("mousedown",e=>startReorder(e,k));

    const info=document.createElement("div");info.className="cinfo";
    const[d,dc]=rowDir(k);
    const title=document.createElement("div");title.className="ctitle";
    title.innerHTML=`第 ${i+1} 根${i===candles.length-1?'<span style="color:var(--dim);font-weight:400">·最新</span>':''} <span class="tag" style="background:${dc}">${d}</span>`;
    const sub=document.createElement("div");sub.className="csub";
    sub.textContent=k.rp
      ?`開 ${fmtPrice(k.rp.o)}　高 ${fmtPrice(k.rp.h)}　低 ${fmtPrice(k.rp.l)}　收 ${fmtPrice(k.rp.c)}`
      :`開 ${px(k.o)}　高 ${px(k.h)}　低 ${px(k.l)}　收 ${px(k.c)}　(點我輸入真實股價)`;
    info.appendChild(title);info.appendChild(sub);
    info.addEventListener("click",()=>{sel=i;expanded=(expanded===i?-1:i);renderList();draw();judge();});

    const del=document.createElement("button");del.className="cdel";del.textContent="⊖";del.title="刪除這根";
    del.addEventListener("click",e=>{e.stopPropagation();removeCandle(i);});

    main.appendChild(dr);main.appendChild(info);main.appendChild(del);
    row.appendChild(main);
    if(expanded===i)row.appendChild(buildEditor(i,k));
    box.appendChild(row);
  });
}
function buildEditor(i,k){
  const ed=document.createElement("div");ed.className="cedit";
  const vals=k.rp?{o:fmtPrice(k.rp.o),h:fmtPrice(k.rp.h),l:fmtPrice(k.rp.l),c:fmtPrice(k.rp.c)}
                 :{o:px(k.o),h:px(k.h),l:px(k.l),c:px(k.c)};
  const q=document.createElement("div");q.className="quotes";
  [["o","開盤"],["h","最高"],["l","最低"],["c","收盤"]].forEach(([f,lab])=>{
    const cell=document.createElement("div");cell.className="q";
    cell.innerHTML=`<div class="l">${lab}</div>`;
    const inp=document.createElement("input");
    inp.type="text";inp.inputMode="decimal";inp.value=vals[f];inp.dataset.f=f;
    cell.appendChild(inp);q.appendChild(cell);
  });
  const btn=document.createElement("button");btn.className="apply";btn.textContent="套用四價";
  const apply=()=>applyEditor(i,ed);
  btn.addEventListener("click",apply);
  q.querySelectorAll("input").forEach(inp=>inp.addEventListener("keydown",e=>{if(e.key==="Enter")apply();}));
  ed.appendChild(q);ed.appendChild(btn);
  return ed;
}
function applyEditor(i,ed){
  const get=f=>parseFloat(ed.querySelector(`input[data-f="${f}"]`).value);
  let O=get("o"),H=get("h"),L=get("l"),C=get("c");
  if([O,H,L,C].some(v=>isNaN(v)||v<=0)){setMsg("請填入四個有效價格(皆需大於 0)","err");return;}
  const realH=Math.max(O,H,L,C),realL=Math.min(O,H,L,C);
  const corrected=(realH!==H||realL!==L);
  candles[i].rp={o:O,h:realH,l:realL,c:C};
  sel=i;refit();draw();judge();renderList();
  setMsg(corrected?`第 ${i+1} 根已套用(最高/最低已自動校正)`:`第 ${i+1} 根已套用`,corrected?"err":"ok");
}
function removeCandle(i){
  candles.splice(i,1);
  if(expanded===i)expanded=-1;else if(expanded>i)expanded--;
  if(sel>=candles.length)sel=candles.length-1;
  if(sel<0)sel=0;
  refit();renderList();draw();judge();
  setMsg("已刪除一根 K 棒","ok");
}
function addCandle(){
  candles.push({o:42,c:58,h:70,l:30});
  sel=candles.length-1;expanded=sel;
  refit();renderList();draw();judge();
  setMsg("已新增一根 K 棒,點它輸入真實股價或拖把手","ok");
  $("clist").lastElementChild?.scrollIntoView({behavior:"smooth",block:"nearest"});
}
$("addBtn").addEventListener("click",addCandle);

/* ── 拖曳排序(以 ≡ 把手,手機/桌面皆可) ── */
let reorder=null;
function startReorder(e,cand){
  e.preventDefault();e.stopPropagation();
  expanded=-1;sel=candles.indexOf(cand);
  reorder={cand};renderList();
}
function reorderMove(e){
  if(!reorder)return;
  e.preventDefault();
  const y=(e.touches?e.touches[0]:e).clientY;
  const cur=candles.indexOf(reorder.cand);
  const rows=[...$("clist").children];
  let tgt=rows.length-1;
  for(let j=0;j<rows.length;j++){const r=rows[j].getBoundingClientRect();if(y<r.top+r.height/2){tgt=j;break;}}
  if(tgt>=0&&tgt!==cur){
    candles.splice(cur,1);candles.splice(tgt,0,reorder.cand);
    sel=tgt;renderList();draw();judge();
  }
  liftFollow(y);
}
/* 讓被拖列放大、跟著手指走,營造「拔起來懸浮」感 */
function liftFollow(y){
  const el=$("clist").querySelector(".crow.reordering");
  if(!el)return;
  el.style.transform="";                       // 先還原,量「靜止位置」中心
  const r=el.getBoundingClientRect();
  const dy=y-(r.top+r.height/2);
  el.style.willChange="transform";
  el.style.transform=`translateY(${dy}px) scale(1.045)`;
}
function endReorder(){if(reorder){reorder=null;renderList();draw();judge();setMsg("順序已更新","ok");}}
document.addEventListener("touchmove",reorderMove,{passive:false});
document.addEventListener("mousemove",reorderMove);
document.addEventListener("touchend",endReorder);
document.addEventListener("mouseup",endReorder);

/* ════════════════════════════════════════════════
   我的收藏:把整個清單命名存進 localStorage
════════════════════════════════════════════════ */
const SAVE_KEY="kline_saves_v2";
const loadSaves=()=>{try{return JSON.parse(localStorage.getItem(SAVE_KEY))||[];}catch(e){return [];}};
const persistSaves=arr=>localStorage.setItem(SAVE_KEY,JSON.stringify(arr));

function renderSaves(){
  const box=$("saves");box.innerHTML="";
  const arr=loadSaves();
  if(!arr.length){
    const s=document.createElement("span");s.className="empty";
    s.textContent="尚無收藏,按右上「＋ 儲存目前畫面」即可保存";
    box.appendChild(s);return;
  }
  arr.forEach(rec=>{
    const chip=document.createElement("div");chip.className="save-chip";
    const name=document.createElement("span");name.className="name";
    name.textContent=`${rec.name}·${rec.candles.length}根`;
    name.addEventListener("click",()=>loadSave(rec));
    const del=document.createElement("button");del.className="del";del.textContent="×";del.title="刪除";
    del.addEventListener("click",e=>{e.stopPropagation();deleteSave(rec.id,rec.name);});
    chip.appendChild(name);chip.appendChild(del);
    box.appendChild(chip);
  });
}
function saveCurrent(){
  if(!candles.length){setMsg("清單是空的,沒有東西可以收藏","err");return;}
  const name=(prompt("幫這個畫面取個名字:")||"").trim();if(!name)return;
  const rec={id:Date.now().toString(36),name,ctx:ctxNow,sel,axis:{...axis},
    candles:candles.map(k=>({o:k.o,c:k.c,h:k.h,l:k.l,rp:k.rp?{...k.rp}:null}))};
  const arr=loadSaves();arr.unshift(rec);persistSaves(arr);renderSaves();
  setMsg(`已收藏「${name}」`,"ok");
}
function loadSave(rec){
  candles=rec.candles.map(k=>({o:k.o,c:k.c,h:k.h,l:k.l,...(k.rp?{rp:{...k.rp}}:{})}));
  axis={...rec.axis};sel=Math.min(rec.sel??candles.length-1,candles.length-1);if(sel<0)sel=0;expanded=-1;
  setCtx(rec.ctx);renderList();draw();judge();
  setMsg(`已載入收藏「${rec.name}」,可直接編輯`,"ok");
}
function deleteSave(id,name){
  if(!confirm(`確定刪除收藏「${name}」?`))return;
  persistSaves(loadSaves().filter(r=>r.id!==id));renderSaves();
}
